name: Build and Deploy Inventory to Amazon ECS Fargate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build --no-cache --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest ./inventory-service
          docker push ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition --task-definition task-definition-inventory --query taskDefinition > task-definition-inventory.json

      - name: Fill in the new image and env vars
        id: render-inventory-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-inventory.json
          container-name: inventory-service-container
          image: ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest
          environment-variables: |
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-inventory-task.outputs.task-definition }}
          service: fargate-inv-service
          cluster: microservice-cluster
          wait-for-service-stability: true