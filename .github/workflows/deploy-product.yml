name: Build and Deploy Product to Amazon ECS Fargate

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Compiles using the root pom, or append -pl product-service if using a multi-module setup
      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Set up QEMU for cross-platform emulation support
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Initialize Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and Push safely with guaranteed AMD64 target compilation matching your product directory
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          file: ./product-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/product-service:latest
          platforms: linux/amd64
          no-cache: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Dynamically pulls your product task definition down from your AWS cluster
      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition --task-definition task-definition-product --query taskDefinition > task-definition-product.json

      # Swaps out the product container image and injects your DB credentials dynamically
      - name: Fill in the new image and env vars
        id: render-product-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-product.json
          container-name: product-service-container  # Make sure this matches your ECS Task Definition container name
          image: ${{ secrets.DOCKER_USERNAME }}/product-service:latest
          environment-variables: |
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}

      # Deploys live to your product service on your ECS cluster
      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-product-task.outputs.task-definition }}
          service: fargate-product-service           # Make sure this matches your active ECS service name
          cluster: microservice-cluster
          wait-for-service-stability: true