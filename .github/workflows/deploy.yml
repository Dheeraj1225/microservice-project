name: Microservices Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest ./order-service
        docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.ORDER_EC2_IP }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/order-service:latest
          docker stop order-service || true
          docker rm order-service || true
          docker run -d --name order-service -p 8082:8082 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://microservice-db-instance.cgti6g24mcph.us-east-1.rds.amazonaws.com:5432/postgres \
            -e SPRING_DATASOURCE_USERNAME=postgres \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
            ${{ secrets.DOCKER_USERNAME }}/order-service:latest
